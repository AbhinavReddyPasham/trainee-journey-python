<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 02 - Day 01</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(-45deg,#001219,#005f73,#0a9396,#94d2bd);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

    width:min(1000px,90%);
    padding:50px;

}

h1{

    color:white;
    text-align:center;
    font-size:45px;
    margin-bottom:45px;
    letter-spacing:2px;

}

ul{

    list-style:none;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:30px;

}

a{

    text-decoration:none;

}

.card{

    height:180px;

    border-radius:22px;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    transition:.45s;

    color:white;

    box-shadow:0 15px 30px rgba(0,0,0,.35);

}

.card:hover{

    transform:translateY(-12px) scale(1.05) rotateX(8deg);

    box-shadow:
    0 0 25px #00f5d4,
    0 0 60px #00f5d4;

}

.card h2{

    margin-bottom:12px;
    font-size:30px;

}

.card p{

    text-align:center;
    opacity:.9;
    padding:0 15px;

}

.arrow{

    margin-top:18px;

    font-size:28px;

    transition:.4s;

}

.card:hover .arrow{

    transform:translateX(12px);

}

/* Individual Card Colors */

.gallery{

    background:linear-gradient(135deg,#06d6a0,#1b9aaa);

}

.flex{

    background:linear-gradient(135deg,#118ab2,#073b4c);

}

.grid{

    background:linear-gradient(135deg,#52b788,#2d6a4f);

}

.float{

    background:linear-gradient(135deg,#ffd166,#f77f00);

}

</style>

</head>

<body>

<div class="container">

<h1>📐 Week 02 - Day 01</h1>

<ul>

<li>

<a href="/Week02/Day1/card-gallery/index.html">

<div class="card gallery">

<h2>🖼️ Gallery</h2>

<p>Responsive Card Gallery</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week02/Day1/flex-layout/index.html">

<div class="card flex">

<h2>📦 Flexbox</h2>

<p>Flexible Layout System</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week02/Day1/grid-layout/index.html">

<div class="card grid">

<h2>🔲 Grid</h2>

<p>CSS Grid Layout</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week02/Day1/float-layout/index.html">

<div class="card float">

<h2>🌊 Float</h2>

<p>Classic Float Layout</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

</ul>

</div>

</body>
</html>
