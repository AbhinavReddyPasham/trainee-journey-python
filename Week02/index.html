<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 02</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(-45deg,#240046,#5a189a,#ff8500,#ff006e);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

    width:min(900px,90%);
    padding:50px;

}

h1{

    text-align:center;
    color:white;
    margin-bottom:50px;
    font-size:46px;
    letter-spacing:2px;

}

ul{

    list-style:none;

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:30px;

}

a{

    text-decoration:none;

}

.card{

    height:180px;

    border-radius:22px;

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.2);

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    transition:.45s;

    box-shadow:0 12px 30px rgba(0,0,0,.35);

}

.card:hover{

    transform:translateY(-12px) rotateX(8deg) scale(1.05);

    box-shadow:
    0 0 25px #ff9e00,
    0 0 60px #ff9e00;

}

.card h2{

    color:white;
    font-size:34px;

}

.card p{

    margin-top:10px;

    color:#ececec;

    text-align:center;

    padding:0 15px;

}

.arrow{

    margin-top:18px;

    font-size:28px;

    transition:.4s;

    color:white;

}

.card:hover .arrow{

    transform:translateX(12px);

}

/* Card Themes */

.day1{

    background:linear-gradient(135deg,#7b2cbf,#9d4edd);

}

.day2{

    background:linear-gradient(135deg,#ff6d00,#ff8500);

}

.day3{

    background:linear-gradient(135deg,#00b4d8,#0077b6);

}

</style>

</head>

<body>

<div class="container">

<h1>🚀 Week 02 Journey</h1>

<ul>

<li>

<a href="/Week02/Day1/index.html">

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week02/Day2/index.html">

<div class="card day2">

<h2>📱 Day 02</h2>

<p>Responsive Design & CSS Architecture</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week02/Day3/layout-trash.html">

<div class="card day3">

<h2>⚡ Day 03</h2>

<p>Browser Fundamentals & Layout Thrashing</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

</ul>

</div>

</body>
</html>
