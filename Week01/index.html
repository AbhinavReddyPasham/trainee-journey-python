<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 01</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(-45deg,#0f172a,#2563eb,#7c3aed,#0ea5e9);
    background-size:400% 400%;
    animation:bg 12s ease infinite;

}

@keyframes bg{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

    width:min(900px,90%);
    padding:50px;

}

h1{

    color:white;
    text-align:center;
    margin-bottom:45px;
    font-size:45px;
    letter-spacing:2px;

}

ul{

    list-style:none;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;

}

a{

    text-decoration:none;

}

.card{

    height:170px;

    border-radius:22px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.2);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    transition:.45s;

    box-shadow:0 12px 25px rgba(0,0,0,.25);

}

.card:hover{

    transform:translateY(-12px) scale(1.05);

    box-shadow:
    0 0 20px #38bdf8,
    0 0 45px #38bdf8;

}

.card h2{

    color:white;
    margin-bottom:12px;

}

.card p{

    color:#e2e8f0;
    text-align:center;
    padding:0 15px;

}

.arrow{

    margin-top:20px;
    font-size:26px;
    color:white;
    transition:.4s;

}

.card:hover .arrow{

    transform:translateX(10px);

}

.box{

background:linear-gradient(135deg,#3b82f6,#06b6d4);

}

.semantic{

background:linear-gradient(135deg,#22c55e,#14b8a6);

}

.spec{

background:linear-gradient(135deg,#f97316,#ef4444);

}

.fix{

background:linear-gradient(135deg,#8b5cf6,#ec4899);

}

</style>

</head>

<body>

<div class="container">

<h1>📚 Week 01 Practicals</h1>

<ul>

<li>

<a href="/Week01/box-model-debug/after-fixed.html">

<div class="card box">

<h2>✅ Day 1</h2>

<p>Box Model Debug<br>After Fix</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week01/box-model-debug/before-fixed.html">

<div class="card fix">

<h2>🛠️ Day 1</h2>

<p>Box Model Debug<br>Before Fix</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week01/Sematic-html-page/index1.html">

<div class="card semantic">

<h2>🌐 Day 2</h2>

<p>Semantic HTML<br>& Accessibility</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

<li>

<a href="/Week01/specificity-demo.html">

<div class="card spec">

<h2>🎯 Day 3</h2>

<p>Specificity Demo</p>

<div class="arrow">➜</div>

</div>

</a>

</li>

</ul>

</div>

</body>
</html>
